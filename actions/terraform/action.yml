name: 'IAM Policy Lens - Terraform IAM Verification'
description: 'Verifies GCP Custom Role permissions in Terraform configs (.tf files) against Policy Lens requirements.'
inputs:
  tf-dir:
    description: 'Path to the directory containing your Terraform (.tf) files'
    required: false
    default: '.'
  policy-json:
    description: 'Path to the Policy Lens JSON file (consolidated policy)'
    required: true
  gapic-calls:
    description: 'Path to the raw GAPIC calls JSON (enables inline code annotations)'
    required: false
    default: ''
  fail-on-extra:
    description: 'Fail the build if extra (over-privileged) permissions are detected in Terraform'
    required: false
    default: 'false'
runs:
  using: 'composite'
  steps:
    - name: Setup Python for Verification
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Run IAM Verification Gate
      shell: bash
      run: |
        ARGS="--tf-dir ${{ inputs.tf-dir }} --policy-json ${{ inputs.policy-json }}"
        if [ -n "${{ inputs.gapic-calls }}" ]; then
          ARGS="$ARGS --gapic-calls ${{ inputs.gapic-calls }}"
        fi
        if [ "${{ inputs.fail-on-extra }}" = "true" ]; then
          ARGS="$ARGS --fail-on-extra"
        fi
        
        python3 ${{ github.action_path }}/verify_iam.py $ARGS
